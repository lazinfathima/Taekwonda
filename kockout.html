<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knockout Bracket</title>

<style>
body {
    font-family: Arial;
    background: #080808;
    margin: 0;
}

.navbar {
    background-color: #2196F3; /* blue to match winner color */
    padding: 20px 40px;
    display: flex;
    justify-content: space-between; /* left & right items */
    align-items: center;
}

/* Left side title */
.navbar .title {
    color: rgb(53, 52, 49); /* matches champion color */
    font-weight: bold;
    font-size: 16px;
}

/* Right side link */
.navbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 5px;
}

.navbar a:hover {
    background-color: #4c84af; /* hover green to match selected */
}

/* MAIN */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 30px;
    flex-wrap: nowrap;
    border: 3px solid #00eaff;   /* border color */
    border-radius: 15px;      /* rounded corners */
    padding: 30px;    
    background-color: #0f172a;         /* extra space inside the border */
    
    }

/* SIDES */
.side {
    display: flex;
}

/* ROUNDS */
.round {
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin: 0 10px;
}

/* MATCH */
.match {
    margin: 15px 0;
}

/* TEAM */
.team {
    background: #bbb;
    padding: 6px;
    margin: 3px 0;
    border-radius: 5px;
    width: 90px; 
    text-align: center;
    color: rgb(8, 8, 8);
    font-size: 12px;
}

/* COLORS */
.winner { background: #325792; }
.selected { background: #35569c; }
.champion {
    background: gold;
    color: black;
    font-weight: bold;
}

/* CENTER */
.center {
    margin: 0 15px;
    text-align: center;
}

.final-box {
    margin: 10px 0;
}

/* RESPONSIVE (auto shrink if needed) */
@media (max-width: 900px) {
    .container {
        transform: scale(0.8);
        transform-origin: top center;
    }
}

@media (max-width: 600px) {
    .container {
        transform: scale(0.6);
    }
}
</style>
</head>

<body>
<div class="navbar">
    <div class="title">Taekwondo Champion</div>
    <a href="index.html">Home</a>
</div>
<h2 style="text-align:center;">Knockout Tournament</h2>

<div class="container">

    <!-- LEFT -->
    <div class="side">

        <div class="round">
            <div class="match"><div class="team">Alice</div><div class="team winner">Bob</div></div>
            <div class="match"><div class="team">Charlie</div><div class="team winner">David</div></div>
            <div class="match"><div class="team">Eve</div><div class="team winner">Frank</div></div>
            <div class="match"><div class="team">Grace</div><div class="team winner">Heidi</div></div>
        </div>

        <div class="round">
            <div class="match"><div class="team selected">Bob</div><div class="team">David</div></div>
            <div class="match"><div class="team selected">Frank</div><div class="team">Heidi</div></div>
        </div>

        <div class="round">
            <div class="match"><div class="team selected">Bob</div><div class="team">Frank</div></div>
        </div>
        <div class="round">
            <div class="match"><div class="team">Bob</div></div>
        </div>    
    </div>

    <!-- CENTER -->
    <div class="center">
        <div class="team champion" style="margin-top:10px;">Champion: Bob</div>
    </div>

    <!-- RIGHT -->
    <div class="side">
        <div class="round">
            <div class="match"><div class="team">Ivan</div></div>
        </div>  
        <div class="round">
            <div class="match"><div class="team selected">Ivan</div><div class="team">Nina</div></div>
        </div>

        <div class="round">
            <div class="match"><div class="team selected">Ivan</div><div class="team">Leo</div></div>
            <div class="match"><div class="team selected">Nina</div><div class="team">Peggy</div></div>
        </div>

        <div class="round">
            <div class="match"><div class="team">Oscar</div><div class="team winner">Ivan</div></div>
            <div class="match"><div class="team">Mallory</div><div class="team winner">Nina</div></div>
            <div class="match"><div class="team">Karl</div><div class="team winner">Leo</div></div>
            <div class="match"><div class="team">Judy</div><div class="team winner">Peggy</div></div>              
        </div>
           
    </div>

</div>

</body>
</html>
